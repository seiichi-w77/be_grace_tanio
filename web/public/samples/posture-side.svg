<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" width="480" height="640">
  <defs>
    <linearGradient id="bgS" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf6f4"/>
      <stop offset="60%" stop-color="#fbe8e2"/>
      <stop offset="100%" stop-color="#d5e3e8"/>
    </linearGradient>
    <linearGradient id="bodyS" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5e2f44"/>
      <stop offset="100%" stop-color="#c8a589"/>
    </linearGradient>
    <radialGradient id="auraS" cx="0.4" cy="0.4" r="0.55">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softS" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
  </defs>

  <rect width="480" height="640" fill="url(#bgS)"/>
  <circle cx="220" cy="240" r="220" fill="url(#auraS)"/>

  <!-- floor shadow -->
  <ellipse cx="240" cy="588" rx="100" ry="12" fill="#2d2a26" opacity="0.08"/>

  <!-- side view silhouette — head, neck, slight forward shoulders, gentle pelvic tilt, knees -->
  <g fill="url(#bodyS)" filter="url(#softS)">
    <!-- head -->
    <ellipse cx="248" cy="116" rx="30" ry="34"/>
    <!-- nose/jaw hint -->
    <path d="M278 110 Q286 118 280 124 L276 128 Q272 124 274 118 Z" opacity="0.45"/>
    <!-- hair flowing -->
    <path d="M222 90 Q204 110 214 158 Q220 174 232 178 L240 168 Q230 152 222 130 Q220 110 228 92 Z" opacity="0.7"/>
    <!-- neck -->
    <path d="M242 150 Q256 162 268 156 L266 182 Q254 188 240 184 Z"/>
    <!-- torso (showing slight forward lean) -->
    <path d="M218 182 Q230 178 268 176
             Q288 220 282 268
             Q288 320 270 360
             L262 410
             Q236 422 218 408
             L222 360
             Q212 318 218 268
             Q210 220 218 182 Z"/>
    <!-- arm hanging -->
    <path d="M236 192 Q220 232 222 290 Q224 360 230 410
             L240 448
             Q244 448 244 442 L238 412 Q236 360 238 296 Q244 240 250 196 Z"/>
    <!-- hips with slight anterior tilt -->
    <path d="M224 406 Q244 416 268 408
             L274 444 Q252 456 230 446 Z"/>
    <!-- thigh -->
    <path d="M232 446 Q236 500 240 558 L260 558 Q262 502 262 458 Z"/>
    <!-- calf / foot -->
    <path d="M242 558 Q250 580 256 590 L284 590 Q288 580 262 558 Z"/>
  </g>

  <!-- AI plumb line (ideal posture reference) -->
  <line x1="248" y1="50" x2="248" y2="600" stroke="#b5677f" stroke-width="0.6" stroke-dasharray="4 6" opacity="0.6"/>

  <!-- actual posture line (slight forward lean — what AI detects) -->
  <line x1="252" y1="80" x2="232" y2="600" stroke="#c79a5a" stroke-width="0.8" opacity="0.7"/>

  <!-- horizontal references -->
  <line x1="60" y1="186" x2="420" y2="186" stroke="#b5677f" stroke-width="0.5" stroke-dasharray="3 7" opacity="0.35"/>
  <line x1="60" y1="416" x2="420" y2="416" stroke="#b5677f" stroke-width="0.5" stroke-dasharray="3 7" opacity="0.35"/>

  <!-- keypoints — ear, shoulder, hip, knee, ankle -->
  <g>
    <circle cx="252" cy="116" r="5" fill="#fffbf7" stroke="#b5677f" stroke-width="1.4"/>
    <circle cx="252" cy="190" r="6" fill="#fffbf7" stroke="#b5677f" stroke-width="1.6"/>
    <circle cx="248" cy="420" r="6" fill="#fffbf7" stroke="#b5677f" stroke-width="1.6"/>
    <circle cx="246" cy="538" r="5" fill="#fffbf7" stroke="#b5677f" stroke-width="1.4"/>
    <circle cx="266" cy="586" r="5" fill="#fffbf7" stroke="#b5677f" stroke-width="1.4"/>
  </g>

  <!-- forward-lean indicator arc -->
  <path d="M252 190 Q256 230 232 410" stroke="#c79a5a" stroke-width="1.2" fill="none" opacity="0.55" stroke-dasharray="2 4"/>

  <g font-family="Cormorant Garamond, Georgia, serif" font-style="italic" fill="#5e2f44" opacity="0.55">
    <text x="32" y="36" font-size="14" letter-spacing="2">Side view · sample</text>
  </g>
  <g font-family="Cormorant Garamond, Georgia, serif" fill="#5e2f44" opacity="0.4">
    <text x="32" y="608" font-size="11" letter-spacing="3">BE GRACE · AI VISION</text>
  </g>
</svg>
