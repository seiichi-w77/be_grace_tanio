<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" width="480" height="640">
  <defs>
    <linearGradient id="bgF" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbe8e2"/>
      <stop offset="55%" stop-color="#f4ebda"/>
      <stop offset="100%" stop-color="#e7c89b"/>
    </linearGradient>
    <linearGradient id="bodyF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8c4b62"/>
      <stop offset="100%" stop-color="#b5677f"/>
    </linearGradient>
    <radialGradient id="aura" cx="0.5" cy="0.4" r="0.55">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="480" height="640" fill="url(#bgF)"/>
  <circle cx="240" cy="240" r="220" fill="url(#aura)"/>

  <!-- floor shadow -->
  <ellipse cx="240" cy="590" rx="120" ry="14" fill="#2d2a26" opacity="0.08"/>

  <!-- elegant minimal female silhouette — front view -->
  <g fill="url(#bodyF)" filter="url(#soft)">
    <!-- head -->
    <circle cx="240" cy="118" r="34"/>
    <!-- neck -->
    <path d="M227 150 Q240 162 253 150 L253 168 Q240 178 227 168 Z"/>
    <!-- torso -->
    <path d="M180 178 Q200 170 240 170 Q280 170 300 178
             Q310 220 304 268
             Q310 320 296 360
             L296 410
             Q270 426 240 426
             Q210 426 184 410
             L184 360
             Q170 320 176 268
             Q170 220 180 178 Z"/>
    <!-- arms — left -->
    <path d="M180 188 Q160 220 156 280 Q154 340 162 400
             Q164 426 158 446 L150 446
             Q142 420 144 378 Q138 318 144 268 Q150 218 168 184 Z"/>
    <!-- arms — right -->
    <path d="M300 188 Q320 220 324 280 Q326 340 318 400
             Q316 426 322 446 L330 446
             Q338 420 336 378 Q342 318 336 268 Q330 218 312 184 Z"/>
    <!-- hips -->
    <path d="M186 408 Q210 414 240 414 Q270 414 294 408
             L302 446 Q272 458 240 458 Q208 458 178 446 Z"/>
    <!-- legs — left -->
    <path d="M194 458 Q200 510 206 560 L206 586
             Q220 590 222 580 L218 558 Q216 514 220 460 Z"/>
    <!-- legs — right -->
    <path d="M286 458 Q280 510 274 560 L274 586
             Q260 590 258 580 L262 558 Q264 514 260 460 Z"/>
  </g>

  <!-- AI measurement grid (subtle vertical center line) -->
  <line x1="240" y1="50" x2="240" y2="610" stroke="#b5677f" stroke-width="0.6" stroke-dasharray="4 6" opacity="0.55"/>

  <!-- horizontal symmetry lines -->
  <line x1="60" y1="200" x2="420" y2="200" stroke="#b5677f" stroke-width="0.5" stroke-dasharray="3 7" opacity="0.35"/>
  <line x1="60" y1="380" x2="420" y2="380" stroke="#b5677f" stroke-width="0.5" stroke-dasharray="3 7" opacity="0.35"/>
  <line x1="60" y1="450" x2="420" y2="450" stroke="#b5677f" stroke-width="0.5" stroke-dasharray="3 7" opacity="0.35"/>

  <!-- AI keypoint markers -->
  <g>
    <!-- shoulders -->
    <circle cx="190" cy="186" r="6" fill="#fffbf7" stroke="#b5677f" stroke-width="1.6"/>
    <circle cx="290" cy="186" r="6" fill="#fffbf7" stroke="#b5677f" stroke-width="1.6"/>
    <!-- hips -->
    <circle cx="196" cy="414" r="6" fill="#fffbf7" stroke="#b5677f" stroke-width="1.6"/>
    <circle cx="284" cy="414" r="6" fill="#fffbf7" stroke="#b5677f" stroke-width="1.6"/>
    <!-- knees -->
    <circle cx="212" cy="540" r="5" fill="#fffbf7" stroke="#b5677f" stroke-width="1.4"/>
    <circle cx="268" cy="540" r="5" fill="#fffbf7" stroke="#b5677f" stroke-width="1.4"/>
  </g>

  <!-- corner label -->
  <g font-family="Cormorant Garamond, Georgia, serif" font-style="italic" fill="#5e2f44" opacity="0.55">
    <text x="32" y="36" font-size="14" letter-spacing="2">Front view · sample</text>
  </g>
  <g font-family="Cormorant Garamond, Georgia, serif" fill="#5e2f44" opacity="0.4">
    <text x="32" y="608" font-size="11" letter-spacing="3">BE GRACE · AI VISION</text>
  </g>
</svg>
